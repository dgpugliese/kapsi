<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c41e3a"/>
      <stop offset="100%" style="stop-color:#8b0000"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Diamond accent shape -->
  <polygon points="256,72 440,256 256,440 72,256" fill="none" stroke="#f5deb3" stroke-width="3" opacity="0.25"/>
  <!-- Inner diamond -->
  <polygon points="256,120 400,256 256,392 112,256" fill="none" stroke="#f5deb3" stroke-width="2" opacity="0.15"/>
  <!-- KAΨ text -->
  <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-weight="bold"
        font-size="130" fill="#f5deb3" letter-spacing="4">KAΨ</text>
  <!-- Connect text -->
  <text x="256" y="360" text-anchor="middle" dominant-baseline="central"
        font-family="'Segoe UI', Arial, sans-serif" font-weight="300"
        font-size="64" fill="#f5deb3" letter-spacing="10">CONNECT</text>
</svg>
