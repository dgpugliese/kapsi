  <circle cx="120" cy="125" r="95" fill="none" stroke="#d4af37" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="120" cy="125" r="88" fill="none" stroke="rgba(212,175,55,0.3)" stroke-width="1"/>
  <!-- Inner field -->
  <circle cx="120" cy="125" r="70" fill="#6b0000"/>
  <!-- Shield -->
  <path d="M95 90 L95 130 C95 155 120 165 120 165 C120 165 145 155 145 130 L145 90Z" fill="none" stroke="#d4af37" stroke-width="2.5"/>
  <path d="M100 95 L100 128 C100 150 120 159 120 159 C120 159 140 150 140 128 L140 95Z" fill="#d4af37" opacity="0.15"/>
  <!-- Scroll/quill inside shield -->
  <rect x="110" y="102" width="20" height="38" rx="3" fill="#d4af37" opacity="0.6"/>
  <line x1="114" y1="110" x2="126" y2="110" stroke="#6b0000" stroke-width="1"/>
  <line x1="114" y1="116" x2="126" y2="116" stroke="#6b0000" stroke-width="1"/>
  <line x1="114" y1="122" x2="126" y2="122" stroke="#6b0000" stroke-width="1"/>
  <line x1="114" y1="128" x2="122" y2="128" stroke="#6b0000" stroke-width="1"/>
