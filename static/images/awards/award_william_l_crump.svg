  <text x="120" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="700" fill="#d4af37" letter-spacing="1">WILLIAM L. CRUMP</text>
  <text x="120" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="rgba(212,175,55,0.7)" letter-spacing="1">AWARDEE</text>
  <!-- Ribbon -->
  <rect x="85" y="232" width="70" height="2" rx="1" fill="#d4af37" opacity="0.5"/>
  <!-- Bottom banner -->
  <path d="M70 245 L90 240 L120 244 L150 240 L170 245 L165 255 L150 250 L120 254 L90 250 L75 255Z" fill="#8B0000" stroke="#d4af37" stroke-width="1"/>
  <text x="120" y="251" text-anchor="middle" font-family="Georgia, serif" font-size="7.5" font-weight="700" fill="#d4af37" letter-spacing="2">KAΨ</text>
</svg>